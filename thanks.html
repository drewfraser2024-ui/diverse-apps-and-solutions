<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Thanks! — Diverse Apps and Solutions</title>
<link rel="stylesheet" href="styles.css" />
<style>
  .thanks-wrap { min-height: 100vh; display: grid; place-items: center; padding: 40px 24px; text-align: center; }
  .thanks-card { max-width: 560px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 56px 40px; }
  .check { font-size: 3rem; margin-bottom: 16px; }
  .thanks-card h1 { font-size: 2rem; margin-bottom: 16px; }
  .thanks-card p { color: var(--muted); margin-bottom: 28px; }
</style>
</head>
<body>
  <div class="thanks-wrap">
    <div class="thanks-card">
      <div class="check">✅</div>
      <h1>Request received!</h1>
      <p>Thanks for reaching out. We'll be in touch within 1 business day to talk through your project.</p>
      <a href="/" class="btn btn-primary">Back to home</a>
    </div>
  </div>
</body>
</html>
